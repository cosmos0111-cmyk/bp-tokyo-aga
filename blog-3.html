    <style>
        :root {
            --primary: #b8860b;
            --primary-glow: rgba(184, 134, 11, 0.3);
            --bg-base: #0a0a0a;
            --bg-card: rgba(15, 15, 15, 0.85);
            --bg-card-hover: rgba(20, 20, 20, 0.95);
            --text-primary: #e0ddd5;
            --text-secondary: #a8a59a;
            --text-accent: #c9a84c;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-glow: rgba(184, 134, 11, 0.25);
            --glass-blur: blur(18px);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
            --font-serif: 'Playfair Display', 'Noto Serif KR', serif;
            --font-sans: 'Inter', 'Noto Sans KR', sans-serif;
            --transition-smooth: 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(ellipse at 30% 20%, rgba(184, 134, 11, 0.08) 0%, transparent 60%), radial-gradient(ellipse at 70% 60%, rgba(184, 134, 11, 0.04) 0%, transparent 55%), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.015"><rect width="100" height="100" fill="none"/><circle cx="20" cy="30" r="0.6" fill="white"/><circle cx="75" cy="18" r="0.5" fill="white"/><circle cx="88" cy="70" r="0.7" fill="white"/><circle cx="12" cy="82" r="0.4" fill="white"/><circle cx="50" cy="55" r="0.55" fill="white"/></svg>');
            background-size: 100% 100%, 100% 100%, 220px 220px;
        }

        /* Editorial Luxury drop caps on first paragraph inside main sections */
        .prose>p:first-of-type:first-letter {
            float: left;
            font-family: var(--font-serif);
            font-size: 4.8rem;
            line-height: 0.8;
            padding-right: 0.6rem;
            padding-top: 0.15rem;
            color: var(--primary);
            text-shadow: 0 0 18px var(--primary-glow);
            font-weight: 700;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-subtle);
        }

        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-accent);
            letter-spacing: 0.06em;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span {
            font-size: 0.85rem;
            font-family: var(--font-sans);
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.04em;
        }

        /* Navigation */
        nav ul {
            list-style: none;
            display: flex;
            gap: 2.2rem;
            flex-wrap: wrap;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            position: relative;
            padding-bottom: 0.35rem;
            transition: color var(--transition-smooth);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1.5px;
            background: var(--primary);
            transition: width var(--transition-smooth);
        }

        nav a:hover {
            color: var(--text-primary);
        }

        nav a:hover::after {
            width: 100%;
        }

        .hamburger-menu {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            flex-direction: column;
            gap: 6px;
            padding: 0.5rem;
        }

        .hamburger-menu span {
            display: block;
            width: 26px;
            height: 2px;
            background: var(--text-primary);
            transition: all 0.3s ease;
        }

        .tel-link {
            color: var(--text-accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color var(--transition-smooth);
        }

        .tel-link:hover {
            color: var(--primary);
        }

        main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 3rem 2rem;
            display: grid;
            grid-template-columns: 2.2fr 1fr;
            gap: 3rem;
        }

        .prose {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        .prose h1 {
            font-family: var(--font-serif);
            font-size: 2.6rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.04em;
            line-height: 1.25;
        }

        .prose h2 {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-accent);
            margin-top: 1rem;
            letter-spacing: 0.03em;
        }

        .prose h3 {
            font-family: var(--font-sans);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .prose p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            line-height: 1.85;
        }

        .trend-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: var(--shadow-card);
            transition: all var(--transition-smooth);
        }

        .trend-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-glow);
            box-shadow: 0 12px 40px rgba(184, 134, 11, 0.15);
            transform: translateY(-2px);
        }

        .trend-card .date {
            font-family: var(--font-sans);
            font-size: 0.8rem;
            color: var(--primary);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
        }

        .trend-card h3 {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .trend-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .trend-card .read-more {
            display: inline-block;
            margin-top: 1.2rem;
            color: var(--text-accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.04em;
            transition: all var(--transition-smooth);
        }

        .trend-card .read-more:hover {
            color: var(--primary);
            text-shadow: 0 0 12px var(--primary-glow);
        }

        aside {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .sidebar-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 1.8rem;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: var(--shadow-card);
        }

        .sidebar-card h4 {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            color: var(--text-accent);
            margin-bottom: 1.2rem;
            letter-spacing: 0.04em;
        }

        .sidebar-card ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .sidebar-card ul li a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color var(--transition-smooth);
            border-bottom: 1px solid transparent;
            padding-bottom: 0.2rem;
        }

        .sidebar-card ul li a:hover {
            color: var(--text-accent);
            border-bottom-color: var(--border-glow);
        }

        .faq-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .faq-section h2 {
            font-family: var(--font-serif);
            font-size: 2rem;
            color: var(--text-accent);
            letter-spacing: 0.04em;
        }

        .faq-item {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all var(--transition-smooth);
        }

        .faq-item:hover {
            border-color: var(--border-glow);
        }

        .faq-item h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.7rem;
        }

        .faq-item p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        footer {
            border-top: 1px solid var(--border-subtle);
            margin-top: 4rem;
            padding: 3rem 2rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            letter-spacing: 0.03em;
        }

        footer a {
            color: var(--text-accent);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            main {
                grid-template-columns: 1fr;
                padding: 2rem 1rem;
                gap: 2rem;
            }

            .prose h1 {
                font-size: 2rem;
            }

            .prose h2 {
                font-size: 1.5rem;
            }

            .hamburger-menu {
                display: flex;
            }

            nav ul {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: rgba(10, 10, 10, 0.95);
                backdrop-filter: var(--glass-blur);
                padding: 1.5rem 2rem;
                gap: 1.5rem;
                border-bottom: 1px solid var(--border-subtle);
            }

            nav ul.nav-present {
                display: flex;
            }

            .trend-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
