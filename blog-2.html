    <style>
        :root {
            --bg: #0a0a0f;
            --surface: rgba(20, 20, 40, 0.6);
            --surface-hover: rgba(30, 30, 60, 0.8);
            --text: #e0e0f0;
            --text-muted: #a0a0c0;
            --accent: #c9a96e;
            --accent-glow: rgba(201, 169, 110, 0.3);
            --border: rgba(255, 255, 255, 0.06);
            --radius: 16px;
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --font-serif: 'Georgia', 'Times New Roman', serif;
            --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(201, 169, 110, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(120, 100, 200, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(200, 160, 100, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Editorial Luxury drop caps on first paragraph inside main sections */


        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: -0.02em;
            transition: color 0.3s ease;
        }

        .logo:hover {
            color: #d4b87a;
        }

        .logo span {
            font-size: 0.7rem;
            display: block;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-family: var(--font-sans);
            font-weight: 400;
        }

        /* Navigation */
        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            position: relative;
            padding: 0.4rem 0;
            transition: color 0.3s ease;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1.5px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        nav a:hover {
            color: var(--text);
        }

        nav a:hover::after,
        nav a.active::after {
            width: 100%;
        }

        nav a.active {
            color: var(--accent);
        }

        /* Hamburger */
        .hamburger-menu {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0.5rem;
            z-index: 101;
        }

        .hamburger-menu span {
            width: 24px;
            height: 2px;
            background: var(--text);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .tel-link {
            display: none;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        main {
            max-width: 960px;
            margin: 0 auto;
            padding: 3rem 2rem 5rem;
            position: relative;
            z-index: 1;
        }

        .prose>p:first-of-type:first-letter {
            float: left;
            font-size: 3.8rem;
            line-height: 0.8;
            font-weight: 700;
            margin-right: 0.6rem;
            color: var(--accent);
            font-family: var(--font-serif);
        }

        h1 {
            font-family: var(--font-serif);
            font-size: 2.6rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 1.2rem;
            letter-spacing: -0.02em;
            line-height: 1.25;
        }

        h2 {
            font-family: var(--font-serif);
            font-size: 1.7rem;
            font-weight: 600;
            color: var(--text);
            margin: 3rem 0 1rem;
            letter-spacing: -0.01em;
        }

        h3 {
            font-family: var(--font-sans);
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent);
            margin: 2rem 0 0.8rem;
        }

        .intro-meta {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .comparison-card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            transition: all 0.35s ease;
            box-shadow: var(--shadow-lg);
        }

        .comparison-card:hover {
            background: var(--surface-hover);
            border-color: rgba(201, 169, 110, 0.25);
            transform: translateY(-4px);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), 0 0 30px var(--accent-glow);
        }

        .comparison-card.featured {
            border-color: var(--accent);
            position: relative;
        }

        .comparison-card.featured::before {
            content: '추천';
            position: absolute;
            top: -12px;
            right: 24px;
            background: var(--accent);
            color: #0a0a0f;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .card-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            margin-bottom: 0.6rem;
        }

        .card-title {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .card-features {
            list-style: none;
            margin: 1.2rem 0;
        }

        .card-features li {
            padding: 0.4rem 0;
            font-size: 0.9rem;
            color: var(--text-muted);
            position: relative;
            padding-left: 1.6rem;
        }

        .card-features li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: 700;
        }

        .card-features li.missing::before {
            content: '✗';
            color: #6b4c4c;
        }

        .card-price {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            margin: 1.2rem 0;
            font-family: var(--font-serif);
        }

        .card-price small {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.8rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-family: var(--font-sans);
        }

        .btn-primary {
            background: var(--accent);
            color: #0a0a0f;
        }

        .btn-primary:hover {
            background: #d4b87a;
            box-shadow: 0 8px 25px var(--accent-glow);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .data-table-wrap {
            overflow-x: auto;
            margin: 2rem 0;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead {
            background: rgba(201, 169, 110, 0.08);
        }

        th {
            padding: 1rem 1.2rem;
            text-align: left;
            font-weight: 600;
            color: var(--accent);
            font-family: var(--font-sans);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        td {
            padding: 1rem 1.2rem;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.015);
            color: var(--text);
        }

        .highlight-row td {
            background: rgba(201, 169, 110, 0.04);
            color: var(--text);
            font-weight: 500;
        }

        .faq-section {
            margin: 4rem 0 2rem;
        }

        .faq-item {
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 0;
        }

        .faq-question {
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            color: var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .faq-answer {
            color: var(--text-muted);
            margin-top: 0.8rem;
            font-size: 0.95rem;
            line-height: 1.7;
        }
</body>
</html>
